<section class="relative w-full h-screen overflow-hidden" id="hero">
  <div class="absolute inset-0 bg-gradient-to-br from-black via-[#3d1a00] to-[#8b4500]"></div>

  <svg id="hero-svg" class="absolute inset-0 w-full h-full pointer-events-none z-10"></svg>

  <!-- nav, contenido, etc -->

  <div class="absolute z-20 flex" id="hero-btns">
    <button id="btn1" class="crosshair-btn"><span>Apply for investment</span></button>
    <button id="btn2" class="crosshair-btn"><span>Learn more</span></button>
  </div>
</section>

<style>
  #hero-svg line { stroke: rgba(255,255,255,0.15); stroke-width: 0.7; }

  .crosshair-btn {
    position: relative;
    background: transparent;
    border: none;
    cursor: pointer;
    color: rgba(255,255,255,0.8);
    font-size: 10px;
    letter-spacing: 0.1em;
    overflow: hidden;
    transition: color 0.3s ease;
    display: flex; align-items: center; justify-content: center;
  }

  .crosshair-btn::before {
    content: '';
    position: absolute; inset: 0;
    background: rgba(255,255,255,0.15);
    transform: scaleY(0);
    transform-origin: bottom;
    transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
  }

  .crosshair-btn:hover::before { transform: scaleY(1); }
  .crosshair-btn:hover { color: white; }
  .crosshair-btn span { position: relative; z-index: 1; }
</style>

<script>
  function buildLayout() {
    const hero = document.getElementById('hero')!;
    const svg  = document.getElementById('hero-svg')!;
    const btns = document.getElementById('hero-btns')!;
    const btn1 = document.getElementById('btn1')!;
    const btn2 = document.getElementById('btn2')!;

    const W = hero.offsetWidth;
    const H = hero.offsetHeight;

    // Ajusta estos valores a tu diseño
    const col1 = Math.round(W * 0.52);
    const col2 = Math.round(W * 0.72);
    const col3 = Math.round(W * 0.90);
    const btnH = 52;
    const row1 = Math.round(H * 0.62);
    const row2 = row1 + btnH;

    // Posicionar botones exactamente entre las líneas
    Object.assign(btns.style, {
      left: col1 + 'px', top: row1 + 'px',
      width: (col3 - col1) + 'px', height: btnH + 'px'
    });
    btn1.style.width = (col2 - col1) + 'px'; btn1.style.height = btnH + 'px';
    btn2.style.width = (col3 - col2) + 'px'; btn2.style.height = btnH + 'px';

    // Dibujar líneas — las mismas que forman los botones + extras de ambiente
    svg.innerHTML = '';
    svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
    const ns = 'http://www.w3.org/2000/svg';

    [col1, col2, col3, W * 0.30].forEach(x => {
      const l = document.createElementNS(ns, 'line');
      l.setAttribute('x1', String(x)); l.setAttribute('y1', '0');
      l.setAttribute('x2', String(x)); l.setAttribute('y2', String(H));
      svg.appendChild(l);
    });

    [row1, row2, H * 0.22, H * 0.82].forEach(y => {
      const l = document.createElementNS(ns, 'line');
      l.setAttribute('x1', '0');  l.setAttribute('y1', String(y));
      l.setAttribute('x2', String(W)); l.setAttribute('y2', String(y));
      svg.appendChild(l);
    });
  }

  requestAnimationFrame(() => setTimeout(buildLayout, 30));
  window.addEventListener('resize', buildLayout);
</script>
